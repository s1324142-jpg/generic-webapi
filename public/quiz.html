<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Roadmap Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    <main class="app-shell">
        <section class="topbar">
            <div>
                <p class="eyebrow">LLM API Powered</p>
                <h1>Learning Roadmap Planner</h1>
            </div>
            <div class="meter" aria-live="polite">
                <span id="progressLabel">0%</span>
                <span>Progress</span>
            </div>
        </section>

        <section class="workspace">
            <aside class="setup-panel">
                <form id="roadmapForm">
                    <div class="field">
                        <label for="skill">学びたいスキル</label>
                        <input type="text" id="skill" value="ReactでWebアプリ開発" maxlength="80" required>
                    </div>

                    <div class="field-grid">
                        <div class="field">
                            <label for="weeks">期間</label>
                            <select id="weeks">
                                <option value="4">4週間</option>
                                <option value="8" selected>8週間</option>
                                <option value="12">12週間</option>
                                <option value="16">16週間</option>
                                <option value="20">20週間</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="level">現在レベル</label>
                            <select id="level">
                                <option value="初心者">初心者</option>
                                <option value="中級者" selected>中級者</option>
                                <option value="上級者">上級者</option>
                            </select>
                        </div>
                    </div>

                    <div class="field">
                        <label for="hoursPerWeek">週あたりの学習時間</label>
                        <input type="number" id="hoursPerWeek" min="1" max="40" value="6">
                    </div>

                    <div class="field">
                        <label for="goal">最終目標</label>
                        <input type="text" id="goal" value="小さな実用アプリを自分で作れるようになる" maxlength="120">
                    </div>

                    <button class="primary-btn" type="submit" id="generateBtn">ロードマップを生成</button>
                </form>

                <div class="summary-panel">
                    <h2>管理</h2>
                    <dl>
                        <div>
                            <dt>完了ステップ</dt>
                            <dd id="doneCount">0 / 0</dd>
                        </div>
                        <div>
                            <dt>現在の計画</dt>
                            <dd id="planName">未生成</dd>
                        </div>
                    </dl>
                    <button class="secondary-btn" type="button" id="savePlanBtn">この計画を保存</button>
                    <button class="secondary-btn" type="button" id="clearProgressBtn">進捗をリセット</button>
                </div>

                <div class="saved-panel">
                    <h2>保存済みロードマップ</h2>
                    <div class="saved-list" id="savedList">
                        <p class="muted">保存済みの計画はまだありません。</p>
                    </div>
                </div>
            </aside>

            <section class="roadmap-panel">
                <div class="empty-state" id="emptyState">
                    <div id="placeholderContent">
                        <h2>学習条件を入力してください</h2>
                        <p>スキル、期間、現在レベルをもとに、LLM APIが週ごとの学習計画を作成します。</p>
                    </div>

                    <div class="roadmap-stage" id="roadmapStage" hidden>
                        <div class="roadmap-header">
                            <div>
                                <p class="eyebrow" id="roadmapMeta">Roadmap</p>
                                <h2 id="roadmapTitle"></h2>
                            </div>
                            <button class="secondary-btn" type="button" id="collapseDoneBtn">完了週を折りたたむ</button>
                        </div>
                        <div class="week-list" id="weekList"></div>
                    </div>
                </div>

                <div class="loading-state" id="loadingState" hidden>
                    <div class="loader"></div>
                    <p>LLM APIでロードマップを生成中...</p>
                </div>
            </section>
        </section>

        <p class="api-status" id="apiStatus">API endpoint: /api/</p>
    </main>

    <script>
        const form = document.getElementById('roadmapForm');
        const generateBtn = document.getElementById('generateBtn');
        const emptyState = document.getElementById('emptyState');
        const placeholderContent = document.getElementById('placeholderContent');
        const loadingState = document.getElementById('loadingState');
        const roadmapStage = document.getElementById('roadmapStage');
        const weekList = document.getElementById('weekList');
        const apiStatus = document.getElementById('apiStatus');
        const progressLabel = document.getElementById('progressLabel');
        const doneCount = document.getElementById('doneCount');
        const planName = document.getElementById('planName');
        const savePlanBtn = document.getElementById('savePlanBtn');
        const clearProgressBtn = document.getElementById('clearProgressBtn');
        const collapseDoneBtn = document.getElementById('collapseDoneBtn');
        const savedList = document.getElementById('savedList');

        let roadmap = [];
        let progress = {};
        let planKey = '';
        let currentPlan = null;
        let hideCompletedWeeks = false;

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            await generateRoadmap();
        });

        document.addEventListener('DOMContentLoaded', renderSavedPlans);

        savePlanBtn.addEventListener('click', () => {
            if (!currentPlan || roadmap.length === 0) {
                setApiStatus('保存できるロードマップがありません。先に生成してください。', true);
                return;
            }
            saveCurrentPlan();
        });

        clearProgressBtn.addEventListener('click', () => {
            if (!planKey) return;
            progress = {};
            saveProgress();
            syncSavedPlanProgress();
            renderRoadmap();
            updateProgress();
            renderSavedPlans();
        });

        collapseDoneBtn.addEventListener('click', () => {
            hideCompletedWeeks = !hideCompletedWeeks;
            collapseDoneBtn.textContent = hideCompletedWeeks ? 'すべての週を表示' : '完了週を折りたたむ';
            renderRoadmap();
        });

        async function generateRoadmap() {
            const skill = document.getElementById('skill').value.trim();
            const count = Number(document.getElementById('weeks').value);
            const level = document.getElementById('level').value;
            const hoursPerWeek = Number(document.getElementById('hoursPerWeek').value);
            const goal = document.getElementById('goal').value.trim() || '実用できるレベルまで到達する';

            if (!skill || !Number.isInteger(count) || count < 1 || count > 20 || hoursPerWeek < 1) {
                setApiStatus('入力内容を確認してください。期間は1から20週間、学習時間は1時間以上です。', true);
                return;
            }

            setLoading(true);
            setApiStatus('LLM APIへロードマップ生成を依頼しています...');

            try {
                const response = await fetch('/api/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: `${skill} ${count}週間ロードマップ`, skill, count, level, hoursPerWeek, goal })
                });

                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || 'API request failed');
                }

                roadmap = normalizeRoadmap(payload.data);
                if (roadmap.length === 0) {
                    throw new Error('有効なロードマップが返りませんでした。');
                }

                planKey = buildPlanKey(skill, count, level, goal);
                currentPlan = {
                    id: planKey,
                    title: payload.title || `${skill} ロードマップ`,
                    skill,
                    count,
                    level,
                    hoursPerWeek,
                    goal,
                    roadmap,
                    savedAt: new Date().toISOString()
                };
                progress = loadProgress();
                renderCurrentPlan();
                setApiStatus(`LLM APIで${roadmap.length}週間の学習計画を生成しました。`);
            } catch (error) {
                console.error(error);
                showPlaceholder();
                setApiStatus(`生成に失敗しました: ${error.message}`, true);
            } finally {
                setLoading(false);
            }
        }

        function normalizeRoadmap(items) {
            if (!Array.isArray(items)) return [];
            return items.map((item, index) => ({
                week: Number(item.week) || index + 1,
                title: String(item.title || `Week ${index + 1}`),
                goal: String(item.goal || ''),
                steps: Array.isArray(item.steps) ? item.steps.slice(0, 5).map(cleanStepText) : [],
                practice: String(item.practice || ''),
                deliverable: String(item.deliverable || ''),
                checkpoint: String(item.checkpoint || ''),
                estimatedHours: Number(item.estimatedHours) || Number(document.getElementById('hoursPerWeek').value)
            })).filter(item => item.steps.length > 0);
        }

        function renderRoadmap() {
            weekList.innerHTML = '';

            roadmap.forEach((week, weekIndex) => {
                const stepKeys = week.steps.map((_, stepIndex) => getStepKey(weekIndex, stepIndex));
                const completedSteps = stepKeys.filter(key => progress[key]).length;
                const isWeekDone = completedSteps === week.steps.length;
                if (hideCompletedWeeks && isWeekDone) return;

                const article = document.createElement('article');
                article.className = `week-card ${isWeekDone ? 'is-complete' : ''}`;
                article.innerHTML = `
                    <div class="week-card-header">
                        <div>
                            <span class="week-number">Week ${week.week}</span>
                            <h3>${escapeHtml(week.title)}</h3>
                        </div>
                        <span class="week-progress">${completedSteps} / ${week.steps.length}</span>
                    </div>
                    <p class="week-goal">${escapeHtml(week.goal)}</p>
                    <ul class="step-list"></ul>
                    <div class="week-details">
                        <p><strong>実践:</strong> ${escapeHtml(week.practice)}</p>
                        <p><strong>成果物:</strong> ${escapeHtml(week.deliverable)}</p>
                        <p><strong>確認:</strong> ${escapeHtml(week.checkpoint)}</p>
                        <p><strong>目安:</strong> ${week.estimatedHours}時間</p>
                    </div>
                `;

                const list = article.querySelector('.step-list');
                week.steps.forEach((step, stepIndex) => {
                    const key = getStepKey(weekIndex, stepIndex);
                    const li = document.createElement('li');
                    const id = `step-${weekIndex}-${stepIndex}`;
                    li.innerHTML = `
                        <input type="checkbox" id="${id}" ${progress[key] ? 'checked' : ''}>
                        <label for="${id}">${escapeHtml(step)}</label>
                    `;
                    li.querySelector('input').addEventListener('change', (event) => {
                        progress[key] = event.target.checked;
                        saveProgress();
                        syncSavedPlanProgress();
                        renderRoadmap();
                        updateProgress();
                        renderSavedPlans();
                    });
                    list.appendChild(li);
                });

                weekList.appendChild(article);
            });
        }

        function renderCurrentPlan() {
            if (!currentPlan) return;
            document.getElementById('roadmapTitle').textContent = currentPlan.title;
            document.getElementById('roadmapMeta').textContent =
                `${currentPlan.level} | ${currentPlan.count}週間 | 週${currentPlan.hoursPerWeek}時間`;
            planName.textContent = currentPlan.skill;
            showRoadmap();
            renderRoadmap();
            updateProgress();
        }

        function updateProgress() {
            const { done, total } = getPlanProgress({ roadmap, progress });
            const percentage = total === 0 ? 0 : Math.round((done / total) * 100);
            progressLabel.textContent = `${percentage}%`;
            doneCount.textContent = `${done} / ${total}`;
        }

        function getPlanProgress(plan) {
            const planRoadmap = Array.isArray(plan.roadmap) ? plan.roadmap : [];
            const planProgress = plan.progress || {};
            const total = planRoadmap.reduce((sum, week) => {
                return sum + (Array.isArray(week.steps) ? week.steps.length : 0);
            }, 0);
            const done = planRoadmap.reduce((sum, week, weekIndex) => {
                const steps = Array.isArray(week.steps) ? week.steps : [];
                return sum + steps.filter((_, stepIndex) => planProgress[getStepKey(weekIndex, stepIndex)]).length;
            }, 0);
            return { done, total };
        }

        function getStepKey(weekIndex, stepIndex) {
            return `w${weekIndex}-s${stepIndex}`;
        }

        function buildPlanKey(skill, count, level, goal) {
            return `roadmap:${skill}:${count}:${level}:${goal}`.toLowerCase();
        }

        function getSavedPlans() {
            try {
                const plans = JSON.parse(localStorage.getItem('savedRoadmaps') || '[]');
                return Array.isArray(plans) ? plans : [];
            } catch {
                return [];
            }
        }

        function setSavedPlans(plans) {
            localStorage.setItem('savedRoadmaps', JSON.stringify(plans));
        }

        function saveCurrentPlan() {
            const plans = getSavedPlans();
            const savedPlan = {
                ...currentPlan,
                roadmap,
                progress,
                savedAt: new Date().toISOString()
            };
            const nextPlans = [savedPlan, ...plans.filter(plan => plan.id !== savedPlan.id)];
            setSavedPlans(nextPlans);
            renderSavedPlans();
            setApiStatus('ロードマップを保存しました。');
        }

        function renderSavedPlans() {
            const plans = getSavedPlans();
            if (plans.length === 0) {
                savedList.innerHTML = '<p class="muted">保存済みの計画はまだありません。</p>';
                return;
            }

            savedList.innerHTML = '';
            plans.forEach(plan => {
                const { done, total } = getPlanProgress(plan);
                const percentage = total === 0 ? 0 : Math.round((done / total) * 100);
                const item = document.createElement('div');
                item.className = 'saved-item';
                item.innerHTML = `
                    <button type="button" class="saved-load">
                        <strong>${escapeHtml(plan.skill)}</strong>
                        <span>${escapeHtml(plan.level)} | ${plan.count}週間 | ${formatSavedDate(plan.savedAt)}</span>
                        <span class="saved-progress-text">完了 ${done} / ${total} ステップ (${percentage}%)</span>
                        <span class="saved-progress-bar"><i style="width: ${percentage}%"></i></span>
                    </button>
                    <button type="button" class="saved-delete" aria-label="${escapeHtml(plan.skill)}を削除">削除</button>
                `;
                item.querySelector('.saved-load').addEventListener('click', () => loadSavedPlan(plan.id));
                item.querySelector('.saved-delete').addEventListener('click', () => deleteSavedPlan(plan.id));
                savedList.appendChild(item);
            });
        }

        function loadSavedPlan(id) {
            const plan = getSavedPlans().find(item => item.id === id);
            if (!plan) return;

            currentPlan = plan;
            roadmap = Array.isArray(plan.roadmap) ? plan.roadmap : [];
            progress = plan.progress || {};
            planKey = plan.id;
            hideCompletedWeeks = false;
            collapseDoneBtn.textContent = '完了週を折りたたむ';
            fillFormFromPlan(plan);
            saveProgress();
            renderCurrentPlan();
            setApiStatus('保存済みロードマップを読み込みました。');
        }

        function syncSavedPlanProgress() {
            if (!currentPlan) return;
            const plans = getSavedPlans();
            const index = plans.findIndex(plan => plan.id === currentPlan.id);
            if (index === -1) return;
            plans[index] = {
                ...plans[index],
                progress,
                savedAt: new Date().toISOString()
            };
            currentPlan = {
                ...currentPlan,
                progress,
                savedAt: plans[index].savedAt
            };
            setSavedPlans(plans);
        }

        function deleteSavedPlan(id) {
            const plans = getSavedPlans().filter(plan => plan.id !== id);
            setSavedPlans(plans);
            renderSavedPlans();
            setApiStatus('保存済みロードマップを削除しました。');
        }

        function fillFormFromPlan(plan) {
            document.getElementById('skill').value = plan.skill || '';
            document.getElementById('weeks').value = String(plan.count || 8);
            document.getElementById('level').value = plan.level || '初心者';
            document.getElementById('hoursPerWeek').value = String(plan.hoursPerWeek || 6);
            document.getElementById('goal').value = plan.goal || '';
        }

        function formatSavedDate(value) {
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return '保存日時不明';
            return `${date.getMonth() + 1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function cleanStepText(value) {
            return String(value).replace(/^[\s□☐✓✔・\-*]+/, '').trim();
        }

        function loadProgress() {
            try {
                return JSON.parse(localStorage.getItem(planKey) || '{}');
            } catch {
                return {};
            }
        }

        function saveProgress() {
            localStorage.setItem(planKey, JSON.stringify(progress));
        }

        function setLoading(isLoading) {
            generateBtn.disabled = isLoading;
            if (isLoading) {
                showLoading();
            }
        }

        function showPlaceholder() {
            loadingState.hidden = true;
            emptyState.hidden = false;
            emptyState.classList.remove('has-roadmap');
            placeholderContent.hidden = false;
            roadmapStage.hidden = true;
        }

        function showLoading() {
            emptyState.hidden = true;
            loadingState.hidden = false;
        }

        function showRoadmap() {
            loadingState.hidden = true;
            emptyState.hidden = false;
            emptyState.classList.add('has-roadmap');
            placeholderContent.hidden = true;
            roadmapStage.hidden = false;
        }

        function setApiStatus(message, isError = false) {
            apiStatus.textContent = message;
            apiStatus.classList.toggle('is-error', isError);
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }
    </script>
</body>
</html>
